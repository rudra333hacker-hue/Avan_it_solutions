<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry - Avan IT Solutions</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="width: 90%; max-width: 700px; padding: 40px; border: 1px solid #333; background: #080808; margin: 50px 0;">
        <h2 style="text-align: center; letter-spacing: 5px; margin-bottom: 40px;">CLIENT DATA ENTRY</h2>
        
        <form action="https://formspree.io/f/your-id" method="POST">
            <input type="hidden" name="_next" value="success.html">
            
            <div style="margin-bottom: 20px;">
                <label style="color:#555; font-size:12px;">NAME</label>
                <input type="text" name="name" required style="width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #222;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="color:#555; font-size:12px;">EMAIL</label>
                <input type="email" name="email" required style="width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #222;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="color:#555; font-size:12px;">COMPANY</label>
                <input type="text" name="company" required style="width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #222;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="color:#555; font-size:12px;">PHONE</label>
                <input type="tel" name="phone" required style="width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #222;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="color:#555; font-size:12px;">SERVICE</label>
                <select name="service" style="width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #222;">
                    <option>Cloud Infrastructure</option>
                    <option>Software Development</option>
                    <option>Technical Staffing</option>
                </select>
            </div>

            <div style="margin-bottom: 40px;">
                <label style="color:#555; font-size:12px;">PROJECT DETAILS</label>
                <textarea name="details" rows="6" style="width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #222;"></textarea>
            </div>

            <button type="submit" class="metal-btn" style="width: 100%; border: none; cursor: pointer;">SUBMIT DATA</button>
        </form>
    </div>

</body>
</html>
