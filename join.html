<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Inquiry | Avan IT Solutions</title>
    <style>
        /* --- METALLIC FORM STYLING --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .form-card {
            width: 100%;
            max-width: 650px;
            background: #080808;
            border: 1px solid #222;
            padding: clamp(20px, 5vw, 50px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { 
            text-align: center; 
            letter-spacing: 5px; 
            margin-bottom: 40px; 
            font-weight: 900;
            font-size: clamp(20px, 4vw, 32px);
            text-transform: uppercase;
        }

        label { 
            color: #555; 
            font-size: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 8px 0 25px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            outline: none;
            font-size: 16px;
            border-radius: 0; /* Industrial sharp edges */
        }

        input:focus, textarea:focus { border-color: #fff; }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            font-weight: 900;
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .submit-btn:hover { 
            background: #bbb; 
            letter-spacing: 6px; 
        }

        .back-home { 
            display: block; 
            text-align: center; 
            color: #444; 
            text-decoration: none; 
            margin-top: 30px; 
            font-size: 12px; 
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-home:hover { color: #fff; }

        /* Mobile specific spacing */
        @media (max-width: 480px) {
            .form-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Client Details</h2>
        
        <form action="https://formspree.io/f/your-id" method="POST">
            <input type="hidden" name="_next" value="success.html">
            
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Email Address</label>
            <input type="email" name="email" placeholder="email@company.com" required>

            <label>Company Name</label>
            <input type="text" name="company" placeholder="Business name" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+1..." required>

            <label>Service Interest</label>
            <select name="service">
                <option value="Cloud">Cloud Infrastructure</option>
                <option value="Software">Software Development</option>
                <option value="Staffing">Staffing Solutions</option>
            </select>

            <label>Project Details</label>
            <textarea name="details" rows="5" placeholder="Tell us about your project requirements..." required></textarea>

            <button type="submit" class="submit-btn">Transmit Data</button>
        </form>
        
        <a href="index.html" class="back-home">← Return to Dashboard</a>
    </div>

</body>
</html>
